<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>マスタ一覧</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .master-grid {
      display: grid;
      gap: 20px;
      margin-top: 24px;
    }
    .master-grid--row1 {
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    }
    .master-grid--half {
      grid-template-columns: repeat(2, 1fr);
    }
    .master-grid--wide {
      grid-template-columns: 1fr;
    }
    .master-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .master-card__head {
      padding: 10px 16px;
      background: rgba(122,162,255,0.08);
      border-bottom: 1px solid var(--line);
      font-size: 13px;
      font-weight: 600;
      color: var(--blue);
      letter-spacing: 0.03em;
    }
    .master-card__body {
      overflow-x: auto;
    }
    .master-tbl {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .master-tbl thead th {
      padding: 7px 12px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      background: var(--deep);
      border-bottom: 1px solid var(--line);
      border-right: 1px solid rgba(255,255,255,0.06);
      white-space: nowrap;
    }
    .master-tbl thead th:last-child { border-right: none; }
    .master-tbl tbody td {
      padding: 7px 12px;
      color: var(--text);
      border-bottom: 1px solid var(--line);
      border-right: 1px solid rgba(255,255,255,0.06);
      white-space: nowrap;
    }
    .master-tbl tbody td:last-child { border-right: none; }
    .master-tbl tbody tr:last-child td { border-bottom: none; }
    .master-tbl tbody tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
    .master-tbl tbody tr:hover td { background: var(--hover); }
    .cell-money { color: var(--green); text-align: left; font-variant-numeric: tabular-nums; }
    .cell-id    { color: var(--dim); font-family: monospace; font-size: 11px; }
    .cell-brand { color: var(--cyan); }
    .badge-nom {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      background: rgba(122,162,255,0.12);
      color: var(--blue);
      margin: 1px 2px;
    }
    .brand-group-head td {
      background: rgba(98,208,255,0.06) !important;
      color: var(--cyan) !important;
      font-weight: 600;
      font-size: 12px;
    }
  </style>
</head>
<body>
<script src="auth.js"></script>
<script>requireAuth();</script>

<!-- トップバー -->
<header class="topbar">
  <span class="topbar__logo">SG</span>
  <span class="topbar__title">予約管理</span>
  <nav class="topbar__nav">
    <a href="index.html">予約一覧</a>
    <a href="master.html" class="active">マスタ一覧</a>
  </nav>
  <span class="topbar__badge">仮画面</span>
  <button onclick="logout()" style="margin-left:12px;padding:4px 12px;background:transparent;border:1px solid var(--line);border-radius:4px;color:var(--muted);font-size:12px;cursor:pointer;" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">ログアウト</button>
</header>

<main class="page page--wide">
  <div class="page-header">
    <h1>マスタ一覧</h1>
    <p>※ こちらは仮画面です。bookingselect.js のオプション定義を表示しています。</p>
  </div>

  <div class="master-grid master-grid--row1" id="grid-row1"></div>
  <div class="master-grid master-grid--half"  id="grid-row2"></div>
  <div class="master-grid master-grid--half"  id="grid-row3"></div>
  <div class="master-grid master-grid--wide"  id="grid-wide"></div>
</main>

<script type="module">
import {
  CAR_OPTIONS, BRANDS, STAFF_OPTIONS,
  NOMINATIONS, COURSE_OPTIONS, EXTENSION_OPTIONS,
  OP_OPTIONS, TRANSPORT_FEE_OPTIONS, DISCOUNT_OPTIONS,
  DELIVERY_TYPE_OPTIONS, MEDIA_OPTIONS, CAST_OPTIONS,
} from './mock/bookingselect.js';

const row1    = document.getElementById('grid-row1');
const row2    = document.getElementById('grid-row2');
const row3    = document.getElementById('grid-row3');
const rowWide = document.getElementById('grid-wide');

// ── ヘルパー ────────────────────────────────────────────────────────────────

function card(title, innerHTML, target) {
  const div = document.createElement('div');
  div.className = 'master-card';
  div.innerHTML = `
    <div class="master-card__head">${title}</div>
    <div class="master-card__body">${innerHTML}</div>
  `;
  target.appendChild(div);
}

function idLabelList(title, items, target) {
  const rows = items.map(o => `
    <tr>
      <td class="cell-id">${o.id}</td>
      <td>${o.label}</td>
    </tr>`).join('');
  card(title, `
    <table class="master-tbl">
      <thead><tr><th>ID</th><th>ラベル</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`, target);
}

function moneyList(title, items, valueKey = 'value', target) {
  const rows = items.map(o => `
    <tr>
      <td class="cell-id">${o.id}</td>
      <td>${o.label}</td>
      <td class="cell-money">¥${o[valueKey].toLocaleString('ja-JP')}</td>
    </tr>`).join('');
  card(title, `
    <table class="master-tbl">
      <thead><tr><th>ID</th><th>ラベル</th><th>金額</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`, target);
}

// ── 1段目: ブランド / 女性 / 担当スタッフ / 行き車・帰り車 ──────────────────

{
  const rows = BRANDS.map((b, i) => `
    <tr>
      <td class="cell-id">${i + 1}</td>
      <td class="cell-brand">${b.label}</td>
      <td class="cell-id">${b.shopId}</td>
    </tr>`).join('');
  card('ブランド', `
    <table class="master-tbl">
      <thead><tr><th>#</th><th>ブランド名</th><th>shopId</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`, row1);
}

{
  const rows = CAST_OPTIONS.map((c, i) => `
    <tr>
      <td class="cell-id">${i + 1}</td>
      <td>${c.label}</td>
      <td class="cell-brand">${BRANDS.find(b => b.shopId === c.shopId)?.label ?? '-'}</td>
      <td class="cell-id">${c.shopId}</td>
      <td class="cell-id">${c.companionId}</td>
    </tr>`).join('');
  card('女性', `
    <table class="master-tbl">
      <thead><tr><th>#</th><th>名前</th><th>ブランド</th><th>shopId</th><th>companionId</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`, row1);
}

idLabelList('担当スタッフ', STAFF_OPTIONS, row1);
idLabelList('ドライバー', CAR_OPTIONS, row1);

// ── 2段目: 媒体 / デリ区分 ───────────────────────────────────────────────────

idLabelList('媒体', MEDIA_OPTIONS, row2);
idLabelList('デリ区分', DELIVERY_TYPE_OPTIONS, row2);

// ── 3段目: 交通費 / 割引 ─────────────────────────────────────────────────────

moneyList('交通費', TRANSPORT_FEE_OPTIONS, 'value', row3);

{
  const rows = DISCOUNT_OPTIONS.map(o => `
    <tr>
      <td class="cell-id">${o.id}</td>
      <td>${o.label}</td>
      <td class="cell-money" style="color:var(--red)">${o.value === 0 ? '-' : '-¥' + o.value.toLocaleString('ja-JP')}</td>
      <td>${o.shopIds.map(sid => {
        const b = BRANDS.find(b => b.shopId === sid);
        return b ? `<span class="badge-nom">${b.label}</span>` : '';
      }).join('')}</td>
    </tr>`).join('');
  card('割引', `
    <table class="master-tbl">
      <thead><tr><th>ID</th><th>ラベル</th><th>金額</th><th>適用ブランド</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`, row3);
}

// ── 4段目: ブランドごとのコース ──────────────────────────────────────────────

{
  const rows = Object.entries(COURSE_OPTIONS).flatMap(([shopId, courses]) => {
    const brandLabel = BRANDS.find(b => b.shopId === shopId)?.label || shopId;
    return [
      `<tr class="brand-group-head"><td colspan="4">${brandLabel}</td></tr>`,
      ...courses.map(c => `
        <tr>
          <td class="cell-id">${c.id}</td>
          <td>${c.label}</td>
          <td style="color:var(--muted)">${c.duration}分</td>
          <td class="cell-money">¥${c.price.toLocaleString('ja-JP')}</td>
        </tr>`),
    ];
  }).join('');
  card('コース', `
    <table class="master-tbl">
      <thead><tr><th>ID</th><th>ラベル</th><th>時間</th><th>料金</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`, rowWide);
}

// ── 5段目: ブランドごとのOP ──────────────────────────────────────────────────

{
  const rows = Object.entries(OP_OPTIONS).flatMap(([shopId, ops]) => {
    const brandLabel = BRANDS.find(b => b.shopId === shopId)?.label || shopId;
    return [
      `<tr class="brand-group-head"><td colspan="3">${brandLabel}</td></tr>`,
      ...ops.map(op => `
        <tr>
          <td class="cell-id">${op.id}</td>
          <td>${op.label}</td>
          <td class="cell-money">¥${op.price.toLocaleString('ja-JP')}</td>
        </tr>`),
    ];
  }).join('');
  card('OP', `
    <table class="master-tbl">
      <thead><tr><th>ID</th><th>ラベル</th><th>料金</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`, rowWide);
}

// ── 6段目: 指名区分 ──────────────────────────────────────────────────────────

{
  const rows = Object.entries(NOMINATIONS).map(([nom, v]) => `
    <tr>
      <td>${nom}</td>
      <td>${v.brands.map(sid => {
        const b = BRANDS.find(b => b.shopId === sid);
        return `<span class="badge-nom">${b ? b.label : sid}</span>`;
      }).join('')}</td>
      <td class="cell-money">${v.membershipFee ? '¥' + v.membershipFee.toLocaleString('ja-JP') : '<span style="color:var(--dim)">-</span>'}</td>
      <td class="cell-money">${v.nominationFee ? '¥' + v.nominationFee.toLocaleString('ja-JP') : '<span style="color:var(--dim)">-</span>'}</td>
      <td class="cell-money">${v.specialNominationFee ? '¥' + v.specialNominationFee.toLocaleString('ja-JP') : '<span style="color:var(--dim)">-</span>'}</td>
    </tr>`).join('');
  card('指名区分', `
    <table class="master-tbl">
      <thead><tr><th>指名区分</th><th>適用ブランド</th><th>入会金</th><th>指名料</th><th>特別指名料</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`, rowWide);
}

// ── 7段目: 延長 ────────────────────────────────────────────────
  
{
  const rows = Object.entries(EXTENSION_OPTIONS).flatMap(([shopId, exts]) => {
    const brandLabel = BRANDS.find(b => b.shopId === shopId)?.label || shopId;
    return [
      `<tr class="brand-group-head"><td colspan="4">${brandLabel}</td></tr>`,
      ...exts.map(e => `
        <tr>
          <td class="cell-id">${e.id}</td>
          <td>${e.label}</td>
          <td style="color:var(--muted)">${e.duration ? e.duration + '分' : '-'}</td>
          <td class="cell-money">${e.price ? '¥' + e.price.toLocaleString('ja-JP') : '<span style="color:var(--dim)">-</span>'}</td>
        </tr>`),
    ];
  }).join('');
  card('延長', `
    <table class="master-tbl">
      <thead><tr><th>ID</th><th>ラベル</th><th>時間</th><th>料金</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`, rowWide);
}
</script>

</body>
</html>
