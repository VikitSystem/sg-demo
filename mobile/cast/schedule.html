<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>予約一覧 — SG キャスト</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
<script src="auth.js"></script>
<script>requireAuth();</script>

<div class="app-shell">
  <!-- Header -->
  <header class="app-header">
    <span class="app-header__logo">SG</span>
    <span class="app-header__title">予約一覧</span>
    <span class="app-header__badge">仮画面</span>
    <button class="app-header__action" onclick="logout()">ログアウト</button>
  </header>

  <!-- Body -->
  <main class="app-body">

    <!-- 日付ナビ -->
    <div class="date-nav">
      <button class="date-nav__btn" id="prev-day" aria-label="前日">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="date-nav__label" id="date-label">2026年4月6日（月）</span>
      <button class="date-nav__btn" id="next-day" aria-label="翌日">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>

    <!-- 件数サマリー -->
    <div style="display:flex;gap:8px;margin-bottom:14px;">
      <span class="badge badge--dim">全 3件</span>
      <span class="badge badge--green">完了 1件</span>
      <span class="badge badge--blue">進行中 1件</span>
      <span class="badge badge--amber">予定 1件</span>
    </div>

    <!-- 予約カード一覧 -->
    <div id="booking-list">

      <!-- 完了 -->
      <div class="card" style="margin-bottom:10px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
          <div style="display:flex;align-items:baseline;gap:6px;">
            <span style="font-size:20px;font-weight:700;color:var(--text);">19:00</span>
            <span style="font-size:13px;color:var(--muted);">〜 20:40</span>
          </div>
          <span class="badge badge--dim">完了</span>
        </div>
        <div style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px;">ナカタ 様</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
          <div style="background:var(--deep);border-radius:6px;padding:8px 10px;">
            <div style="font-size:10px;color:var(--dim);margin-bottom:2px;">コース</div>
            <div style="font-size:12px;color:var(--text);">60分コース</div>
          </div>
          <div style="background:var(--deep);border-radius:6px;padding:8px 10px;">
            <div style="font-size:10px;color:var(--dim);margin-bottom:2px;">延長</div>
            <div style="font-size:12px;color:var(--text);">20分延長</div>
          </div>
          <div style="background:var(--deep);border-radius:6px;padding:8px 10px;">
            <div style="font-size:10px;color:var(--dim);margin-bottom:2px;">デリバリー</div>
            <div style="font-size:12px;color:var(--text);">ホテル1</div>
          </div>
          <div style="background:var(--deep);border-radius:6px;padding:8px 10px;">
            <div style="font-size:10px;color:var(--dim);margin-bottom:2px;">担当</div>
            <div style="font-size:12px;color:var(--text);">田中</div>
          </div>
        </div>
      </div>

      <!-- 進行中 -->
      <div class="card card--accent-blue" style="margin-bottom:10px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
          <div style="display:flex;align-items:baseline;gap:6px;">
            <span style="font-size:20px;font-weight:700;color:var(--text);">21:30</span>
            <span style="font-size:13px;color:var(--muted);">〜 23:00</span>
          </div>
          <span class="badge badge--green">進行中</span>
        </div>
        <div style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:4px;">ヤマダ 様</div>
        <div style="font-size:12px;color:var(--amber);margin-bottom:8px;">📝 初回のお客様</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
          <div style="background:rgba(0,0,0,0.2);border-radius:6px;padding:8px 10px;">
            <div style="font-size:10px;color:var(--dim);margin-bottom:2px;">コース</div>
            <div style="font-size:12px;color:var(--text);">90分コース</div>
          </div>
          <div style="background:rgba(0,0,0,0.2);border-radius:6px;padding:8px 10px;">
            <div style="font-size:10px;color:var(--dim);margin-bottom:2px;">延長</div>
            <div style="font-size:12px;color:var(--text);">なし</div>
          </div>
          <div style="background:rgba(0,0,0,0.2);border-radius:6px;padding:8px 10px;">
            <div style="font-size:10px;color:var(--dim);margin-bottom:2px;">デリバリー</div>
            <div style="font-size:12px;color:var(--text);">ホテル2</div>
          </div>
          <div style="background:rgba(0,0,0,0.2);border-radius:6px;padding:8px 10px;">
            <div style="font-size:10px;color:var(--dim);margin-bottom:2px;">担当</div>
            <div style="font-size:12px;color:var(--text);">佐藤</div>
          </div>
        </div>
      </div>

      <!-- 予定 -->
      <div class="card" style="margin-bottom:10px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
          <div style="display:flex;align-items:baseline;gap:6px;">
            <span style="font-size:20px;font-weight:700;color:var(--text);">23:30</span>
            <span style="font-size:13px;color:var(--muted);">〜 01:00</span>
          </div>
          <span class="badge badge--amber">予定</span>
        </div>
        <div style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px;">サトウ 様</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
          <div style="background:var(--deep);border-radius:6px;padding:8px 10px;">
            <div style="font-size:10px;color:var(--dim);margin-bottom:2px;">コース</div>
            <div style="font-size:12px;color:var(--text);">60分コース</div>
          </div>
          <div style="background:var(--deep);border-radius:6px;padding:8px 10px;">
            <div style="font-size:10px;color:var(--dim);margin-bottom:2px;">延長</div>
            <div style="font-size:12px;color:var(--text);">なし</div>
          </div>
          <div style="background:var(--deep);border-radius:6px;padding:8px 10px;">
            <div style="font-size:10px;color:var(--dim);margin-bottom:2px;">デリバリー</div>
            <div style="font-size:12px;color:var(--text);">ホテル1</div>
          </div>
          <div style="background:var(--deep);border-radius:6px;padding:8px 10px;">
            <div style="font-size:10px;color:var(--dim);margin-bottom:2px;">担当</div>
            <div style="font-size:12px;color:var(--text);">田中</div>
          </div>
        </div>
      </div>

    </div>

  </main>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a class="bottom-nav__item" href="home.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      ホーム
    </a>
    <a class="bottom-nav__item active" href="schedule.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      予約
    </a>
    <a class="bottom-nav__item" href="attendance.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      勤怠
    </a>
    <a class="bottom-nav__item" href="profile.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
      マイページ
    </a>
  </nav>
</div>

<script>
  const DAYS = ['日', '月', '火', '水', '木', '金', '土'];
  let current = new Date('2026-04-06');

  function updateLabel() {
    const y = current.getFullYear();
    const m = current.getMonth() + 1;
    const d = current.getDate();
    const w = DAYS[current.getDay()];
    document.getElementById('date-label').textContent = `${y}年${m}月${d}日（${w}）`;
  }

  document.getElementById('prev-day').addEventListener('click', () => {
    current.setDate(current.getDate() - 1);
    updateLabel();
  });
  document.getElementById('next-day').addEventListener('click', () => {
    current.setDate(current.getDate() + 1);
    updateLabel();
  });
</script>
</body>
</html>
