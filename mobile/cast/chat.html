<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>顧客チャット — SG キャスト</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    .talk-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      text-decoration: none;
      color: var(--text);
      transition: background 0.15s;
      cursor: pointer;
    }
    .talk-item:first-child { border-top: 1px solid var(--line); }
    .talk-item:hover { background: var(--hover); }

    .talk-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--panel-row);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--muted);
      flex-shrink: 0;
      border: 1px solid var(--line);
    }

    .talk-body {
      flex: 1;
      min-width: 0;
    }
    .talk-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .talk-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }
    .talk-time {
      font-size: 11px;
      color: var(--dim);
      flex-shrink: 0;
    }
    .talk-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .talk-preview {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .talk-unread {
      flex-shrink: 0;
      min-width: 18px;
      height: 18px;
      background: var(--red);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 5px;
    }
  </style>
</head>
<body>
<script src="auth.js"></script>
<script>requireAuth();</script>

<div class="app-shell">
  <!-- Header -->
  <header class="app-header">
    <span class="app-header__logo">SG</span>
    <span class="app-header__title">顧客チャット</span>
    <span class="app-header__badge">仮画面</span>
    <button class="app-header__action" onclick="logout()">ログアウト</button>
  </header>

  <!-- Body -->
  <main class="app-body" style="padding-left:0;padding-right:0;">

    <a class="talk-item" href="chat_room.html?id=1">

      <div class="talk-body">
        <div class="talk-header">
          <span class="talk-name">田中さん</span>
          <span class="talk-time">14:10</span>
        </div>
        <div class="talk-footer">
          <span class="talk-preview">ありがとうございます😊お待ちしています！</span>
          <span class="talk-unread">2</span>
        </div>
      </div>
    </a>

    <a class="talk-item" href="chat_room.html?id=2">
      <div class="talk-avatar">鈴</div>
      <div class="talk-body">

          <span class="talk-name">鈴木さん</span>
          <span class="talk-time">昨日</span>
        </div>
        <div class="talk-footer">
          <span class="talk-preview">また来週伺いますね！</span>
        </div>
      </div>

    <a class="talk-item" href="chat_room.html?id=3">
      <div class="talk-avatar">佐</div>

        <div class="talk-header">
          <span class="talk-name">佐藤さん</span>

        </div>
        <div class="talk-footer">
          <span class="talk-preview">今夜21時ごろ予約できますか？</span>

        </div>

    <a class="talk-item" href="chat_room.html?id=4">

    </a>

    <a class="talk-item" href="chat_room.html?id=5">

  </main>

  <!-- Bottom Nav -->
