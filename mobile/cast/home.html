<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>ホーム — SG キャスト</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
<script src="auth.js"></script>
<script>requireAuth();</script>

<div class="app-shell">
  <!-- Header -->
  <header class="app-header">
    <span class="app-header__logo">SG</span>
    <span class="app-header__title">キャストポータル</span>
    <span class="app-header__badge">仮画面</span>
    <button class="app-header__action" onclick="logout()">ログアウト</button>
  </header>

  <!-- Body -->
  <main class="app-body">

    <!-- 挨拶 + 出勤状態 -->
    <div class="card card--accent-green mb-16" style="display:flex;align-items:center;gap:14px;">
      <div style="width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#0b0d12;flex-shrink:0;">あ</div>
      <div style="flex:1;">
        <div style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:2px;">あおい さん</div>
        <div style="font-size:12px;color:var(--muted);">ごほうび</div>
      </div>
      <span class="badge badge--green" id="status-badge">● 出勤中</span>
    </div>

    <!-- 今日の概要 -->
    <div class="summary-grid">
      <div class="summary-card">
        <div class="summary-card__label">本日の予約</div>
        <div class="summary-card__value" id="today-count">0<span class="summary-card__unit">件</span></div>
      </div>
      <div class="summary-card">
        <div class="summary-card__label">出勤時間</div>
        <div class="summary-card__value" style="font-size:16px;" id="clock-in-time">18:30〜</div>
      </div>
    </div>

    <!-- 次の予約 -->
    <div class="section-header">
      <h2>次の予約</h2>
      <a href="schedule.html">すべて見る</a>
    </div>
    <div id="next-booking"></div>

    <!-- 本日の予約一覧 -->
    <div class="section-header mt-4">
      <h2>本日の予約</h2>
    </div>
    <div class="card" id="today-bookings"></div>

  </main>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a class="bottom-nav__item active" href="home.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      ホーム
    </a>
    <a class="bottom-nav__item" href="schedule.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      予約
    </a>
    <a class="bottom-nav__item" href="attendance.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      勤怠
    </a>
    <a class="bottom-nav__item" href="profile.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
      マイページ
    </a>
  </nav>
</div>

<!-- ─── モーダル ─── -->
<div class="modal-overlay" id="modal-overlay"></div>
<div class="modal-sheet" id="modal-sheet" role="dialog" aria-modal="true">
  <div class="modal-sheet__handle"></div>
  <div class="modal-sheet__header">
    <div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:4px;" id="modal-time"></div>
      <div class="modal-sheet__title" id="modal-name"></div>
    </div>
    <button class="modal-sheet__close" id="modal-close" aria-label="閉じる">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <div class="modal-sheet__body">
    <div id="modal-note" style="display:none;font-size:12px;color:var(--amber);margin-bottom:12px;"></div>
    <div class="modal-detail-grid" id="modal-grid"></div>
  </div>
  <div class="modal-sheet__footer">
    <button class="modal-action-btn modal-action-btn--start" id="btn-start">接客開始</button>
    <button class="modal-action-btn modal-action-btn--end"   id="btn-end">接客終了</button>
  </div>
</div>

<script type="module">
  import { TODAY_BOOKINGS } from './mock/schedule.js';

  // ── 共通ヘルパー ──────────────────────────────────────────
  const STATUS_BADGE_INLINE = {
    completed: '<span class="badge badge--dim"   style="font-size:10px;padding:2px 6px;">完了</span>',
    active:    '<span class="badge badge--green" style="font-size:10px;padding:2px 6px;">進行中</span>',
    pending:   '<span class="badge badge--amber" style="font-size:10px;padding:2px 6px;">予定</span>',
  };
  const DOT_CLASS = { completed: 'is-done', active: 'is-active', pending: '' };
  const bookingMap = new Map(TODAY_BOOKINGS.map(b => [b.id, b]));

  // ── 今日の件数 ────────────────────────────────────────────
  document.getElementById('today-count').innerHTML =
    `${TODAY_BOOKINGS.length}<span class="summary-card__unit">件</span>`;

  // ── 次の予約カード ─────────────────────────────────────────
  const featured = TODAY_BOOKINGS.find(b => b.status === 'active')
               ?? TODAY_BOOKINGS.find(b => b.status === 'pending');

  if (featured) {
    const statusBadge = featured.status === 'active'
      ? '<span class="badge badge--green">進行中</span>'
      : '<span class="badge badge--amber">予定</span>';
    const noteHtml = featured.note
      ? `<div style="font-size:12px;color:var(--amber);margin-top:6px;">📝 ${featured.note}</div>`
      : '';
    const extPart = featured.extensionLabel && featured.extensionLabel !== 'なし'
      ? ` ＋ ${featured.extensionLabel}` : '';

    document.getElementById('next-booking').innerHTML = `
      <div class="card card--accent-blue" data-booking-id="${featured.id}" style="cursor:pointer;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <span style="font-size:22px;font-weight:700;color:var(--text);">${featured.time}</span>
          ${statusBadge}
        </div>
        <div style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:4px;">${featured.customerName} 様</div>
        <div style="font-size:13px;color:var(--muted);">${featured.courseLabel}${extPart} &nbsp;|&nbsp; ${featured.deliveryLabel}</div>
        ${noteHtml}
        <div style="display:flex;gap:8px;margin-top:14px;">
          <div style="flex:1;background:var(--deep);border-radius:8px;padding:8px 10px;">
            <div style="font-size:10px;color:var(--dim);margin-bottom:2px;">送迎（往）</div>
            <div style="font-size:12px;color:var(--text);">${featured.carGoingLabel}</div>
          </div>
          <div style="flex:1;background:var(--deep);border-radius:8px;padding:8px 10px;">
            <div style="font-size:10px;color:var(--dim);margin-bottom:2px;">送迎（帰）</div>
            <div style="font-size:12px;color:var(--text);">${featured.carReturnLabel}</div>
          </div>
          <div style="flex:1;background:var(--deep);border-radius:8px;padding:8px 10px;">
            <div style="font-size:10px;color:var(--dim);margin-bottom:2px;">担当スタッフ</div>
            <div style="font-size:12px;color:var(--text);">${featured.staffLabel}</div>
          </div>
        </div>
      </div>`;
  } else {
    document.getElementById('next-booking').innerHTML =
      '<div class="card" style="color:var(--muted);font-size:13px;text-align:center;padding:20px;">本日の予約はありません</div>';
  }

  // ── 本日の予約リスト ───────────────────────────────────────
  function renderItem(b) {
    const extPart = b.extensionLabel && b.extensionLabel !== 'なし'
      ? ` ＋ ${b.extensionLabel}` : '';
    const noteHtml = b.note
      ? `<div class="booking-item__note">📝 ${b.note}</div>` : '';
    return `
      <div class="booking-item" data-booking-id="${b.id}" style="cursor:pointer;">
        <div class="booking-item__time">
          <div class="booking-item__time-start">${b.time}</div>
          <div class="booking-item__time-end">〜${b.outTime}</div>
        </div>
        <div class="booking-item__dot">
          <div class="booking-item__dot-circle ${DOT_CLASS[b.status] ?? ''}"></div>
        </div>
        <div class="booking-item__body">
          <div class="booking-item__customer">
            ${b.customerName} 様
            ${STATUS_BADGE_INLINE[b.status] ?? ''}
          </div>
          <div class="booking-item__detail">${b.courseLabel}${extPart} &nbsp;|&nbsp; ${b.deliveryLabel}</div>
          ${noteHtml}
        </div>
      </div>`;
  }

  document.getElementById('today-bookings').innerHTML =
    TODAY_BOOKINGS.length
      ? TODAY_BOOKINGS.map(renderItem).join('')
      : '<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px;">本日の予約はありません</div>';

  // ── モーダル制御 ───────────────────────────────────────────
  const overlay  = document.getElementById('modal-overlay');
  const sheet    = document.getElementById('modal-sheet');
  const btnStart = document.getElementById('btn-start');
  const btnEnd   = document.getElementById('btn-end');

  function openModal(booking) {
    // ヘッダー
    document.getElementById('modal-time').textContent =
      `${booking.time} 〜 ${booking.outTime}`;
    document.getElementById('modal-name').textContent =
      `${booking.customerName} 様`;

    // ノート
    const noteEl = document.getElementById('modal-note');
    if (booking.note) {
      noteEl.textContent = `📝 ${booking.note}`;
      noteEl.style.display = '';
    } else {
      noteEl.style.display = 'none';
    }

    // 詳細グリッド
    const cells = [
      ['コース',     booking.courseLabel],
      ['延長',       booking.extensionLabel],
      ['デリバリー', booking.deliveryLabel],
      ['担当スタッフ', booking.staffLabel],
      ['送迎（往）', booking.carGoingLabel],
      ['送迎（帰）', booking.carReturnLabel],
    ];
    document.getElementById('modal-grid').innerHTML = cells.map(([label, value]) =>
      `<div class="modal-detail-cell">
        <div class="modal-detail-cell__label">${label}</div>
        <div class="modal-detail-cell__value">${value}</div>
      </div>`
    ).join('');

    // ボタン状態
    // pending  → 接客開始 のみ有効
    // active   → 接客終了 のみ有効
    // completed→ 両方無効
    btnStart.disabled = booking.status !== 'pending';
    btnEnd.disabled   = booking.status !== 'active';

    overlay.classList.add('is-open');
    sheet.classList.add('is-open');
  }

  function closeModal() {
    overlay.classList.remove('is-open');
    sheet.classList.remove('is-open');
  }

  // オーバーレイ・閉じるボタン
  overlay.addEventListener('click', closeModal);
  document.getElementById('modal-close').addEventListener('click', closeModal);

  // 仮実装トースト
  function toast(msg) {
    const el = document.createElement('div');
    el.textContent = msg;
    Object.assign(el.style, {
      position: 'fixed', bottom: '100px', left: '50%', transform: 'translateX(-50%)',
      background: 'var(--panel)', border: '1px solid var(--line-2)', color: 'var(--text)',
      padding: '10px 20px', borderRadius: '8px', fontSize: '13px', zIndex: '400',
      boxShadow: 'var(--shadow)', whiteSpace: 'nowrap', opacity: '1', transition: 'opacity 0.3s',
    });
    document.body.appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 2000);
  }

  btnStart.addEventListener('click', () => {
    toast('接客開始を記録しました（仮）');
    closeModal();
  });
  btnEnd.addEventListener('click', () => {
    toast('接客終了を記録しました（仮）');
    closeModal();
  });

  // 予約クリック（イベント委譲）
  document.addEventListener('click', e => {
    const target = e.target.closest('[data-booking-id]');
    if (!target) return;
    const booking = bookingMap.get(target.dataset.bookingId);
    if (booking) openModal(booking);
  });
</script>
</body>
</html>
