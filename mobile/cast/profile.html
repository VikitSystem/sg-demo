<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>マイページ — SG キャスト</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
<script src="auth.js"></script>
<script>requireAuth();</script>

<div class="app-shell">
  <!-- Header -->
  <header class="app-header">
    <span class="app-header__logo">SG</span>
    <span class="app-header__title">マイページ</span>
    <span class="app-header__badge">仮画面</span>
    <button class="app-header__action" onclick="logout()">ログアウト</button>
  </header>

  <!-- Body -->
  <main class="app-body">

    <!-- プロフィールカード -->
    <div class="card mb-16" style="display:flex;align-items:center;gap:16px;">
      <div class="profile-avatar">あ</div>
      <div class="profile-info">
        <div class="profile-info__name">あおい</div>
        <div class="profile-info__brand">ごほうび &nbsp;|&nbsp; レギュラー</div>
        <div style="margin-top:6px;display:flex;gap:6px;">
          <span class="badge badge--blue" style="font-size:10px;">在籍中</span>
          <span class="badge badge--dim"  style="font-size:10px;">ID: 101</span>
        </div>
      </div>
    </div>

    <!-- 今月の実績 -->
    <div class="date-nav">
      <button class="date-nav__btn" id="prev-month" aria-label="前月">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="date-nav__label" id="month-label">2026年4月の実績</span>
      <button class="date-nav__btn" id="next-month" aria-label="翌月">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div class="summary-grid mb-16">
      <div class="summary-card">
        <div class="summary-card__label">出勤日数</div>
        <div class="summary-card__value">5<span class="summary-card__unit">日</span></div>
      </div>
      <div class="summary-card">
        <div class="summary-card__label">総勤務時間</div>
        <div class="summary-card__value">24.5<span class="summary-card__unit">h</span></div>
      </div>
      <div class="summary-card">
        <div class="summary-card__label">接客本数</div>
        <div class="summary-card__value">13<span class="summary-card__unit">件</span></div>
      </div>
      <div class="summary-card">
        <div class="summary-card__label">シフト未提出</div>
        <div class="summary-card__value">4/10</div>
      </div>
    </div>

    <!-- メニュー -->
    <div class="section-header">
      <h2>設定・その他</h2>
    </div>
    <div class="menu-list">
      <a class="menu-item" href="#">
        <span class="menu-item__icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </span>
        <span class="menu-item__label">個別設定</span>
        <span class="menu-item__arrow">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </span>
      </a>
      <a class="menu-item" href="#">
        <span class="menu-item__icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <span class="menu-item__label">パスワード変更</span>
        <span class="menu-item__arrow">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </span>
      </a>
      <a class="menu-item" href="#">
        <span class="menu-item__icon" style="color:var(--muted);">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </span>
        <span class="menu-item__label">店舗お問い合わせ</span>
        <span class="menu-item__arrow">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </span>
      </a>
    </div>

    <div style="text-align:center;margin-top:20px;font-size:11px;color:var(--dim);">
      SG キャストポータル &nbsp;v0.1.0 (仮)<br>
      <span style="font-size:10px;">※ こちらは仮実装の画面です</span>
    </div>

  </main>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a class="bottom-nav__item" href="home.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      ホーム
    </a>
    <a class="bottom-nav__item" href="schedule.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      予約
    </a>
    <a class="bottom-nav__item" href="attendance.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      勤怠
    </a>
    <a class="bottom-nav__item" href="chat.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      顧客チャット
    </a>
    <a class="bottom-nav__item active" href="profile.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
      マイページ
    </a>
  </nav>
</div>

<script>
  (function () {
    var current = new Date(2026, 3, 1); // 2026年4月
    function render() {
      var y = current.getFullYear();
      var m = current.getMonth() + 1;
      document.getElementById('month-label').textContent = y + '年' + m + '月の実績';
    }
    document.getElementById('prev-month').addEventListener('click', function () {
      current.setMonth(current.getMonth() - 1);
      render();
    });
    document.getElementById('next-month').addEventListener('click', function () {
      current.setMonth(current.getMonth() + 1);
      render();
    });
    render();
  })();
</script>
</body>
</html>
