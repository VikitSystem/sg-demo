<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>勤怠 — SG キャスト</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
<script src="auth.js"></script>
<script>requireAuth();</script>

<div class="app-shell">
  <!-- Header -->
  <header class="app-header">
    <span class="app-header__logo">SG</span>
    <span class="app-header__title">勤怠</span>
    <span class="app-header__badge">仮画面</span>
    <button class="app-header__action" onclick="logout()">ログアウト</button>
  </header>

  <!-- Body -->
  <main class="app-body">

    <!-- 現在時刻 -->
    <div class="card text-center" style="padding:20px 16px 16px;">
      <div style="font-size:11px;color:var(--muted);letter-spacing:0.06em;margin-bottom:6px;">現在時刻</div>
      <div style="font-size:48px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;line-height:1;" id="clock">21:30</div>
      <div style="font-size:13px;color:var(--muted);margin-top:6px;" id="today-date">2026年4月6日（月）</div>
      <div style="margin-top:12px;">
        <span class="badge badge--green" id="work-status">● 出勤中</span>
      </div>
    </div>

    <!-- 打刻ボタン -->
    <div style="margin-bottom:16px;">
      <div class="clock-btn-group">
        <button class="clock-btn clock-btn--in"  id="btn-in">出勤</button>
        <button class="clock-btn clock-btn--break" id="btn-break">休憩</button>
        <button class="clock-btn clock-btn--out"  id="btn-out">退勤</button>
      </div>
      <div style="font-size:11px;color:var(--dim);text-align:center;">※ 打刻は仮実装です。実際には送信されません。</div>
    </div>

    <!-- 本日の打刻記録 -->
    <div class="section-header">
      <h2>本日の打刻記録</h2>
    </div>
    <div class="card mb-16" id="today-log"></div>

    <!-- 当月サマリー -->
    <div class="section-header">
      <h2>4月の実績</h2>
    </div>
    <div class="summary-grid mb-16">
      <div class="summary-card">
        <div class="summary-card__label">出勤日数</div>
        <div class="summary-card__value">5<span class="summary-card__unit">日</span></div>
      </div>
      <div class="summary-card">
        <div class="summary-card__label">総勤務時間</div>
        <div class="summary-card__value" id="total-hours">24.5<span class="summary-card__unit">h</span></div>
      </div>
      <div class="summary-card">
        <div class="summary-card__label">接客本数</div>
        <div class="summary-card__value">13<span class="summary-card__unit">件</span></div>
      </div>
      <div class="summary-card">
        <div class="summary-card__label">シフト未提出</div>
        <div class="summary-card__value">4/10</div>
      </div>
    </div>

    <!-- 今月のシフト -->
    <div class="section-header">
      <h2>今月のシフト</h2>
      <button id="shift-show-all" style="font-size:12px;color:var(--blue);background:none;border:none;cursor:pointer;padding:0;">すべて見る</button>
    </div>
    <div class="card mb-16" id="shift-card"></div>

    <!-- 直近の勤怠ログ -->
    <div class="section-header">
      <h2>直近の打刻履歴</h2>
    </div>
    <div class="card" id="recent-log-card"></div>

  </main>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a class="bottom-nav__item" href="home.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      ホーム
    </a>
    <a class="bottom-nav__item" href="schedule.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      予約
    </a>
    <a class="bottom-nav__item active" href="attendance.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      勤怠
    </a>
    <a class="bottom-nav__item" href="chat.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      チャット
    </a>
    <a class="bottom-nav__item" href="profile.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
      マイページ
    </a>
  </nav>
</div>

<script type="module" src="./script.js"></script>
</body>
</html>
