<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>予約一覧</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<script src="auth.js"></script>
<script>requireAuth();</script>

<!-- トップバー -->
<header class="topbar">
  <span class="topbar__logo">SG</span>
  <span class="topbar__title">予約管理</span>
  <nav class="topbar__nav">
    <a href="index.html" class="active">予約一覧</a>
    <a href="master.html">マスタ一覧</a>
  </nav>
  <span class="topbar__badge">仮画面</span>
  <button onclick="logout()" style="margin-left:12px;padding:4px 12px;background:transparent;border:1px solid var(--line);border-radius:4px;color:var(--muted);font-size:12px;cursor:pointer;" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">ログアウト</button>
</header>

<main class="page page--wide">
  <div class="page-header">
    <h1>予約一覧</h1>
    <p>※ こちらは仮画面です。項目・レイアウトは今後調整します。</p>
    <div id="summary-table"></div>
    <div class="preset-bar">
      <span class="preset-bar__label">表示項目：</span>
      <button class="preset-btn is-active" data-preset="全項目">全項目</button>
      <button class="preset-btn" data-preset="監査項目">監査項目</button>
      <button class="preset-btn" data-preset="連携項目">連携項目</button>
      <button class="preset-btn" data-preset="作業項目">作業項目</button>
    </div>
  </div>

  <!-- フィルタバー -->
  <div class="filter-bar">
    <div class="filter-group">
      <label>日付</label>
      <input type="date" value="2026-03-28" />
    </div>
    <div class="filter-group">
      <label>ブランド</label>
      <select id="filter-brand">
        <option value="">すべて</option>
        <option>ブランドA</option>
        <option>ブランドB</option>
        <option>ブランドC</option>
        <option>ブランドD</option>
      </select>
    </div>
    <div class="filter-group">
      <label>担当</label>
      <select id="filter-staff">
        <option value="">すべて</option>
        <option>田中</option>
        <option>佐藤</option>
        <option>高橋</option>
        <option>中村</option>
        <option>渡辺</option>
      </select>
    </div>
    <div class="filter-group">
      <label>完了</label>
      <select id="filter-completed">
        <option value="">すべて</option>
        <option value="done">完了</option>
        <option value="undone">未完了</option>
      </select>
    </div>
    <span class="badge-count"><strong id="booking-count">0</strong> 件</span>
  </div>

  <!-- サマリーテーブル -->
  <div id="summary-table"></div>

  <!-- テーブル -->
  <div class="table-wrap">
    <table class="booking-table">
      <thead>
        <tr>
          <th class="col-sticky cell-no">#</th>
          <th>伝達</th>
          <th>ヘブン</th>
          <th>ブランド</th>
          <th>担当</th>
          <th>TEL</th>
          <th>確電</th>
          <th>お客様名</th>
          <th>指名区分</th>
          <th>媒体<br><span class="th-sub">(S前回日)</span></th>
          <th>財布</th>
          <th>アンケ</th>
          <th>売上受取</th>
          <th>女性</th>
          <th>予約時間</th>
          <th>コース</th>
          <th>延長</th>
          <th>金額</th>
          <th>IN</th>
          <th>OUT</th>
          <th>デリ区分</th>
          <th>場所</th>
          <th>部屋番</th>
          <th>OP</th>
          <th>交通費</th>
          <th>割引</th>
          <th>女性伝達備考</th>
          <th>店舗備考</th>
          <th>行き車</th>
          <th>帰り車</th>
          <th>距離</th>
          <th>移動時間</th>
          <th>アウト予定時刻</th>
          <th>shopId</th>
          <th>memberId</th>
          <th>companionId</th>
          <th>SGリンク</th>
          <th>入会金</th>
          <th>指名料</th>
          <th>特別指名料</th>
          <th>コース料金</th>
          <th>延長</th>
          <th>OP</th>
          <th>交通費</th>
          <th>割引</th>
        </tr>
      </thead>
      <tbody id="booking-tbody"></tbody>
    </table>
  </div>
</main>

<!-- 予約追加ボタン（FAB） -->
<button class="fab-add" id="fab-add">＋ 予約追加</button>

<script type="module" src="script.js"></script>

</body>
</html>
