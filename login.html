<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ログイン — SG 予約管理</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
    }
    .login-card {
      width: 100%;
      max-width: 360px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 36px 32px 32px;
    }
    .login-logo {
      font-size: 22px;
      font-weight: 700;
      color: var(--blue);
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }
    .login-title {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
    }
    .login-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }
    .login-input {
      width: 100%;
      box-sizing: border-box;
      background: var(--deep);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 12px;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .login-input:focus {
      border-color: var(--blue);
    }
    .login-btn {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 10px;
      background: var(--blue);
      color: #0b0d12;
      font-size: 13px;
      font-weight: 700;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .login-btn:hover { opacity: 0.85; }
    .login-error {
      margin-top: 12px;
      font-size: 12px;
      color: var(--red);
      min-height: 16px;
      text-align: center;
    }
    .login-note {
      margin-top: 24px;
      font-size: 11px;
      color: var(--dim);
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">SG</div>
    <div class="login-title">関係者向けデモページ</div>
    <label class="login-label" for="code">アクセスコード</label>
    <input class="login-input" type="password" id="code" placeholder="アクセスコードを入力" autocomplete="off" />
    <label class="login-label" for="password" style="margin-top:14px;">パスワード</label>
    <input class="login-input" type="password" id="password" placeholder="パスワードを入力" autocomplete="off" />
    <button class="login-btn" id="login-btn">ログイン</button>
    <div class="login-error" id="login-error"></div>
    <div class="login-note">このページは関係者向けのデモ画面です。<br>アクセスコードをお持ちの方のみご利用いただけます。</div>
  </div>

  <script src="auth.js"></script>
  <script>
    // すでにログイン済みなら即リダイレクト
    if (isAuthed()) {
      const params = new URLSearchParams(location.search);
      const dest = params.get('redirect') || 'index.html';
      location.replace(dest);
    }

    document.getElementById('login-btn').addEventListener('click', doLogin);
    document.getElementById('code').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('password').focus();
    });
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    function doLogin() {
      const code     = document.getElementById('code').value.trim();
      const password = document.getElementById('password').value.trim();
      if (login(code, password)) {
        const params = new URLSearchParams(location.search);
        const dest = params.get('redirect') || 'index.html';
        location.replace(dest);
      } else {
        document.getElementById('login-error').textContent = 'アクセスコードが正しくありません';
        document.getElementById('code').focus();
      }
    }
  </script>
</body>
</html>
